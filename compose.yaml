services:
  init:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "npx --yes create-next-app@latest /tmp/next-app --typescript --tailwind --eslint --app --src-dir --import-alias '@/*' --no-turbopack &&
             find /tmp/next-app -maxdepth 1 -mindepth 1 | xargs -I{} cp -r {} /app/"

  app:
    build:
      context: .
      target: dev
      args:
        HOST_HOME: ${HOME}
        HOST_UID: ${UID:-1000}
        HOST_GID: ${GID:-1000}
    hostname: kanji-dev
    # Run as the host user so HOME, UID and file ownership all line up.
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      # Mount Claude config AND the native install at the identical host paths
      # so the shared ~/.claude.json resolves the same ~/.local/bin/claude.
      - ${HOME}/.claude:${HOME}/.claude
      - ${HOME}/.claude.json:${HOME}/.claude.json
      - ${HOME}/.local/share/claude:${HOME}/.local/share/claude
      - ${HOME}/.local/bin:${HOME}/.local/bin
    environment:
      - NODE_ENV=development
      - HOME=${HOME}
    tty: true

volumes:
  node_modules:
